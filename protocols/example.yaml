# =============================================================================
# Protocol declarativo do PrivacyScope — exemplo mínimo para o C3
#
# Este protocolo é o input declarativo que governa uma execução completa do
# pipeline. O hash SHA-256 deste arquivo é gravado no audit_log de cada
# RawEvidence persistida, garantindo rastreabilidade entre parâmetros e
# resultados (Wilson et al., 2017; Sculley et al., 2015).
#
# Para a piloto B4 real (n=50, prevista para 28/05/2026), este arquivo será
# duplicado e ajustado. Para o smoke C3, é executado com n=5 sites baseline.
# =============================================================================

metadata:
  protocol_version: "c3-smoke-v0.1.0"
  description: "Smoke C3 — pipeline completo via Orchestrator+CLI com n=5"

# -----------------------------------------------------------------------------
# Fonte amostral. Para o MVP, apenas Tranco com filtro por TLD .br.
# Estratificação proporcional (governamental vs empresarial) entra no B7,
# após feedback do orientador sobre os Resultados Preliminares.
# -----------------------------------------------------------------------------
sources:
  - name: tranco
    params:
      tld_filter: ".br"
      max_n: 5

# Para o smoke C3, override declarativo com sites baseline (sobrescreve sources):
override_domains:
  - "https://www.gov.br/anpd/pt-br"
  - "https://www.serpro.gov.br"
  - "https://www.uol.com.br"
  - "https://www.gov.br"
  - "https://www.mercadolivre.com.br"

# -----------------------------------------------------------------------------
# Repositório de evidência bruta (camada 3)
# -----------------------------------------------------------------------------
repository:
  name: filesystem
  params:
    base_path: "data/run/"

# -----------------------------------------------------------------------------
# Resultados estruturados (camada 5)
# -----------------------------------------------------------------------------
result_store:
  name: sqlite
  params:
    db_path: "data/run/results.sqlite"

# -----------------------------------------------------------------------------
# Coleta (camada 2) — chain HttpFetcher → PlaywrightFetcher
# -----------------------------------------------------------------------------
fetcher:
  name: fallback_chain
  params:
    fetchers:
      - name: http_simples
        params:
          respect_robots_txt: true
          max_per_category: 1
          max_total_subpages: 4
          connect_timeout_s: 10
          read_timeout_s: 30
        escalate_if:
          - signal: cookies_pre_consent_zero
          - signal: html_root_smaller_than_bytes
            threshold: 5000
          - signal: subpage_selection_empty
          - signal: has_js_shell_markers
          - exception: JsRequiredError
          - exception: NavigationFailedError
          # Refinamento F1 (2026-05-20): escala ao Playwright em qualquer
          # FetchError do http_simples (inclui HTTP 403 de anti-bot).
          # RobotsDisallowedError continua abortando (abort_on tem precedência).
          - exception: FetchError
      - name: playwright
        params:
          headless: true
          phase_screenshots: true
          revoke_after_consent: false
          scroll_max_iterations: 3
          max_per_category: 1
          max_total_subpages: 4
        # último na cadeia — sem escalate_if
    abort_on:
      - exception: RobotsDisallowedError

# -----------------------------------------------------------------------------
# Análise (camada 4) — 3 VariableTests determinísticos do MVP
# -----------------------------------------------------------------------------
tests:
  - name: banner_cookies
    params: {}
  - name: politica_privacidade
    params: {}
  - name: canal_titular
    params: {}
