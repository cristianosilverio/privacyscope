# =============================================================================
# B7 RECOLETA — reexecucao das 55 falhas da coleta B7 com o fetcher endurecido.
#
# Motivo: 55/258 candidatos falharam (gov 22, corp 33). Diagnostico (run.log):
#   25 ERR_NAME_NOT_RESOLVED, 13 erro de certificado, 6 timeout, 4 conn refused,
#   2 HTTP2, 5 outros. Parte e recuperavel: certificado (ignore_https_errors=True)
#   e apex-morto-mas-www-vivo (www-fallback). Ambos implementados no PlaywrightFetcher.
#
# As correcoes sao ADITIVAS: so mudam o desfecho de fetches que antes erravam; os 203
# sucessos da rodada principal seriam byte-identicos, por isso NAO sao reprocessados.
# Os recuperados aqui sao unidos aos 203 no pos-processamento (selecao das efetivas).
#
# Detectores: identicos ao b7.yaml (banner v0.3.1, politica v0.2.1, canal v0.2.2).
# =============================================================================

metadata:
  protocol_version: "b7-recollect-v1.0.0"
  description: "Recoleta das 55 falhas do B7 com fetcher endurecido (cert + www-fallback)"

# 55 dominios que falharam na coleta b7-v1.0.0 (gov + corp), na ordem do sample congelado.
