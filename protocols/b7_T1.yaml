# =============================================================================
# B7_T1 — RECOLETA UNIVERSAL DA SUBAMOSTRA HELD-OUT B8 (n=50)
#
# Motivo metodologico (registrado para defesa em banca):
# ---------------------------------------------------------------------------
# A subamostra B8 (n=50, sorteada da amostra B7 efetiva com seed 20260606)
# serve como held-out cego para validacao independente dos detectores
# deterministicos (banner v0.3.1, politica v0.2.1, canal v0.2.2). A coleta
# original do B7 foi realizada em 24/05/2026. A rotulagem manual cega
# (gold standard) foi realizada em 06-07/06/2026, ~13 dias depois.
#
# Tres problemas observados durante a analise forense dos FN do B8:
#   1. Defasagem temporal de 13 dias entre snapshot do detector e estado do
#      sitio observado pelo rotulador humano.
#   2. Falhas tecnicas de coleta na rodada original (ex.: predize.com.br
#      retornou DOM vazio em 24/05; navega normalmente em 07/06).
#   3. Padrao estrutural conhecido em sitios .gov.br: material LGPD em
#      profundidade 2, atras de secoes de Acesso a Informacao (Lei
#      12.527/2011 — LAI). Confirmado em saogoncalo.rn (acessoainformacao.php
#      → lgpd.php) e cgu (acesso-a-informacao → privacidade-e-protecao-de-dados).
#
# Caminho escolhido (decisao 2026-06-07): recoleta UNIVERSAL dos 50 sitios
# em t1 (=hoje), preservando intacto o snapshot original em data/b7/. Este
# protocolo executa a recoleta sem alterar detectores; apenas o pipeline de
# descoberta de subpaginas evoluiu (subpage v0.3.0 com categoria-trampolim).
# Compara-se b7_T0 (24/05) vs b7_T1 (08/06) lado a lado no V6.
# ---------------------------------------------------------------------------
#
# Detectores: identicos ao b7.yaml (banner v0.3.1, politica v0.2.1, canal v0.2.2).
# Pipeline de descoberta de subpaginas: subpage v0.3.0 (trampolim LAI).
# Fetchers: http v0.2.0 (final_url pos-redirect), playwright v0.2.0.
# =============================================================================

metadata:
  protocol_version: "b7-T1-v1.0.0"
  description: >
    Recoleta universal da subamostra held-out B8 (n=50) em t1=2026-06-08.
    Mesmas regras do b7-v1.0.0; trampolim LAI ativo via subpage v0.3.0.
    Snapshot original (b7_T0, 24/05) preservado intacto em data/b7/.

# Universo: 50 sitios da subamostra held-out B8, gerada por
# scripts/sample_b8.py com random.Random(20260606) sobre as 200 efetivas
# do B7. Estratificada: 40 corporativos + 10 governamentais (mesma proporcao
# 80/20 do B7). Ordem preservada conforme b8_subamostra.csv (ordem_b8 1..50).
