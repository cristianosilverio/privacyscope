# =============================================================================
# Piloto B4 — coleta estratificada n=50 (buffer 59)
#
# Amostra gerada por scripts/sample_b4.py (seed 20260520, Tranco top-1M .br)
# e revisada manualmente em 2026-05-20. Removido ns4.to.gov.br (name server,
# não site institucional — heurística de infraestrutura reforçada após este
# achado). Buffer efetivo: 11 governamentais + 48 empresariais.
#
# Alocação 40 empresariais + 10 governamentais (sobre-representação do estrato
# governamental; objetivo = panorama geral do mercado, não comparação entre
# estratos). Seleção das 50 efetivas por estrato será pós-processada do SQLite,
# tomando as 40 corp + 10 gov primeiras que coletarem com sucesso.
#
# Folga: gov 11→10 (margem 1); corp 48→40 (margem 8). gov tende a coletar bem
# (sem anti-bot; todos os .gov.br do pré-piloto coletaram). Se >1 gov falhar,
# completar amostra posteriormente.
# =============================================================================

metadata:
  protocol_version: "b4-pilot-v1.0.0"
  description: "Piloto B4 n=50 estratificado (buffer 59: 11 gov + 48 corp); 3 variaveis deterministicas"

