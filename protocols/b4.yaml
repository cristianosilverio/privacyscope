repository:
  name: filesystem
  params:
    base_path: "data/b4/"

result_store:
  name: sqlite
  params:
    db_path: "data/b4/results.sqlite"

fetcher:
  name: fallback_chain
  params:
    fetchers:
      - name: http_simples
        params:
          respect_robots_txt: true
          max_per_category: 2
          max_total_subpages: 6
          connect_timeout_s: 10
          read_timeout_s: 30
        escalate_if:
          - signal: cookies_pre_consent_zero
          - signal: html_root_smaller_than_bytes
            threshold: 5000
          - signal: subpage_selection_empty
          - signal: has_js_shell_markers
          - exception: JsRequiredError
          - exception: NavigationFailedError
          - exception: FetchError   # F1: escala anti-bot 403 ao Playwright
      - name: playwright
        params:
          headless: true
          phase_screenshots: true
          revoke_after_consent: false
          scroll_max_iterations: 3
          max_per_category: 2
          max_total_subpages: 6
    abort_on:
      - exception: RobotsDisallowedError

tests:
  - name: banner_cookies
    params: {}
  - name: politica_privacidade
    params: {}
  - name: canal_titular
    params: {}
